# 10 chaos experiments — fill #2-9, keep #1 + #10 as reference
# Each entry needs ALL 5 fields per §5: name, hypothesis, blast_radius, rollback, measurement, ground_truth

experiments:

  - id: 1
    name: payment_latency
    fault_type: latency
    target: payment-svc
    hypothesis: |
      Steady-state: probe pass-rate >= 99%, p99 latency < 500ms.
      Injecting 500ms ± 100ms delay on payment-svc network egress for 60s,
      pipeline detector fires latency anomaly within 30s and RCA picks payment-svc.
      probe pass-rate may drop to 70-80% during inject (acceptable).
    blast_radius:
      target: 1 instance of payment-svc
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 50% for 20s
      method: tc qdisc del dev eth0 root
    measurement:
      metrics: [probe_pass_rate, p99_latency, detector_alerts, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: payment-svc
      expected_fault_class: latency

  - id: 2
    name: payment_network_loss
    fault_type: network_loss
    target: payment-svc
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Injecting 30% packet loss on payment-svc network egress interface for 60s,
      pipeline detector fires error_rate anomaly within 30s and RCA picks payment-svc.
      probe pass-rate may drop to 70-80% during inject.
    blast_radius:
      target: 1 instance of payment-svc
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 50% for 20s
      method: pumba netem --duration 60s loss --percent 30 payment-svc
    measurement:
      metrics: [probe_pass_rate, error_rate_alert, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: payment-svc
      expected_fault_class: network_loss

  - id: 3
    name: inventory_availability
    fault_type: availability
    target: inventory-svc
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Killing inventory-svc pod every 60s for 120s,
      pipeline detector fires availability anomalies within 45s and RCA picks inventory-svc.
    blast_radius:
      target: inventory-svc pods
      duration_seconds: 120
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 40% for 30s
      method: kubectl scale deployment inventory-svc --replicas=3
    measurement:
      metrics: [probe_pass_rate, availability_alert, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: inventory-svc
      expected_fault_class: availability

  - id: 4
    name: api_gateway_cpu
    fault_type: cpu_saturation
    target: api-gateway
    hypothesis: |
      Steady-state: probe pass-rate >= 99%, p99 latency < 500ms.
      Stressing api-gateway CPU utilization to 90% for 90s,
      pipeline detector fires CPU anomalies on gateway and latency anomalies on checkout/frontend,
      and RCA picks api-gateway.
    blast_radius:
      target: api-gateway container
      duration_seconds: 90
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 30% for 20s
      method: killall stress-ng
    measurement:
      metrics: [probe_pass_rate, gateway_cpu_utilization, downstream_latency, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: api-gateway
      expected_fault_class: cpu_saturation

  - id: 5
    name: payment_db_memory
    target: payment-db
    fault_type: memory
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Filling payment-db memory volume to 95% for 60s,
      pipeline detector fires database connection pool saturation alerts and RCA picks payment-db.
    blast_radius:
      target: payment-db container
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: db_connection_errors > 10 for 15s
      method: docker exec payment-db memory_clean.sh
    measurement:
      metrics: [probe_pass_rate, db_conn_pool_saturation, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: payment-db
      expected_fault_class: memory

  - id: 6
    name: auth_clock_skew
    target: auth-svc
    class: auth
    fault_type: time_skew
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Injecting +60s clock skew on auth-svc for 60s, JWT verification fails,
      pipeline detector fires token/auth anomaly alerts and RCA picks auth-svc.
    blast_radius:
      target: auth-svc container
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: jwt_failures > 50 for 10s
      method: chronyc -a makestep
    measurement:
      metrics: [probe_pass_rate, jwt_validation_failure_rate, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: auth-svc
      expected_fault_class: time_skew

  - id: 7
    name: log_collector_disk
    target: log-collector
    fault_type: disk_fill
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Filling log-collector disk volume to 95% for 120s,
      log ingestion lag spikes, pipeline detector fires ingestion lag anomalies and RCA picks log-collector.
    blast_radius:
      target: log-collector disk volume
      duration_seconds: 120
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: ingestion_lag > 300s
      method: rm -f /var/log/collector/dummy_fill.log
    measurement:
      metrics: [probe_pass_rate, log_ingestion_lag, rca_root_service]
      capture_window_seconds: 400
    ground_truth:
      expected_root_service: log-collector
      expected_fault_class: disk_fill

  - id: 8
    name: gateway_partition
    target: frontend
    fault_type: network_partition
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Disconnecting network connection between frontend and api-gateway for 30s,
      frontend times out on api calls, pipeline detector fires all-downstream timeout alerts,
      and RCA picks api-gateway (or edge).
    blast_radius:
      target: frontend/api-gateway link
      duration_seconds: 30
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 10% for 15s
      method: iptables -D INPUT -j DROP
    measurement:
      metrics: [probe_pass_rate, call_timeout_rate, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: api-gateway
      expected_fault_class: network_partition

  - id: 9
    name: dns_slow_lookup
    target: dns-resolver
    fault_type: dns_latency
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Adding 2s latency to DNS lookups on dns-resolver for 60s,
      services experience intermittent lookup delays and connection errors,
      pipeline detector fires lookup latency alerts, and RCA picks dns-resolver.
    blast_radius:
      target: dns-resolver container
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: dns_lookup_time > 1s
      method: toxiproxy-cli toxic remove dns_latency
    measurement:
      metrics: [probe_pass_rate, dns_lookup_latency, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: dns-resolver
      expected_fault_class: dns_latency

  - id: 10
    name: checkout_retry_storm
    fault_type: http_error
    target: checkout-svc
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Injecting 20% HTTP 500 on checkout-svc responses for 90s, client retries
      amplify load on upstream payment-svc + inventory-svc. Pipeline must NOT
      pick checkout-svc as root (it's the symptom carrier, not cause). RCA
      should pick payment-svc OR inventory-svc (whichever shows queue depth).
    blast_radius:
      target: 100% of checkout-svc requests
      duration_seconds: 90
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 30% for 30s
      method: toxiproxy-cli toxic remove
    measurement:
      metrics: [probe_pass_rate, retry_count, upstream_queue_depth, rca_root_service]
      capture_window_seconds: 600
    ground_truth:
      expected_root_service: NOT checkout-svc  # negative test
      expected_fault_class: cascade_retry
