  #   6  auth-svc          clock skew +60s              → JWT/cert fail, RCA auth
  #   7  log-collector     disk fill 95%                → ingestion lag (meta-monitor)
  #   8  frontend/gateway  full network partition 30s   → all-downstream timeout, RCA edge
