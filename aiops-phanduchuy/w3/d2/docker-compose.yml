version: '3.8'

volumes:
  shared-data:

services:
  # AIOps Pipeline
  pipeline:
    build: .
    container_name: aiops-pipeline
    ports:
      - "${PIPELINE_PORT:-8000}:${PIPELINE_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - .:/app
      - shared-data:/app/shared
    working_dir: /app
    command: python3 service_mock.py pipeline

  # Checkout Service
  checkout-svc:
    build: .
    container_name: checkout-svc
    ports:
      - "${CHECKOUT_PORT:-8080}:${CHECKOUT_PORT:-8080}"
    env_file:
      - .env
    volumes:
      - .:/app
      - shared-data:/app/shared
    working_dir: /app
    command: python3 service_mock.py checkout-svc

  # Prometheus
  prometheus:
    build: .
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    env_file:
      - .env
    volumes:
      - .:/app
      - shared-data:/app/shared
    working_dir: /app
    command: python3 service_mock.py prometheus

  # Grafana
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:${GRAFANA_PORT:-3000}"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin

  # 10 Microservices (Idle Simulation)
  frontend:
    build: .
    container_name: frontend
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py frontend

  api-gateway:
    build: .
    container_name: api-gateway
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py api-gateway

  payment-svc:
    build: .
    container_name: payment-svc
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py payment-svc

  payment-db:
    build: .
    container_name: payment-db
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py payment-db

  inventory-svc:
    build: .
    container_name: inventory-svc
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py inventory-svc

  inventory-db:
    build: .
    container_name: inventory-db
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py inventory-db

  notification-svc:
    build: .
    container_name: notification-svc
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py notification-svc

  kafka:
    build: .
    container_name: kafka
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py kafka

  auth-svc:
    build: .
    container_name: auth-svc
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py auth-svc

  log-collector:
    build: .
    container_name: log-collector
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py log-collector

  dns-resolver:
    build: .
    container_name: dns-resolver
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py dns-resolver

  cache-svc:
    build: .
    container_name: cache-svc
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 service_mock.py cache-svc
