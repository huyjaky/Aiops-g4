version: 1
services:
  - name: api
    sli:
      name: api_availability
      kind: availability
      formula: "count(2xx,3xx,4xx_not_429 AND latency<500ms) / count(all)"
      promql_good: 'sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[1m]))'
      promql_total: 'sum(rate(http_requests_total[1m]))'
      source: access_log.jsonl
    slo:
      target: 0.999
      window_days: 30
    budget:
      total_events_per_month: 20737800
      allowed_failures_per_month: 20737
      downtime_minutes_equivalent: 43

  - name: db
    sli:
      name: db_query_success
      kind: latency
      formula: "count(success AND duration<100ms) / count(all)"
      promql_good: 'sum(rate(db_queries_total{success="true",duration_le="100"}[1m]))'
      promql_total: 'sum(rate(db_queries_total[1m]))'
      source: db_query_log.jsonl
    slo:
      target: 0.9995
      window_days: 30
    budget:
      total_events_per_month: 1726380
      allowed_failures_per_month: 863
      downtime_minutes_equivalent: 22

  - name: frontend
    sli:
      name: frontend_page_load_ok
      kind: availability
      formula: "count(dom_ready<3000 AND no_js_err AND no_net_err) / count(all)"
      promql_good: 'sum(rate(frontend_rum_total{dom_ready_ms_le="3000",js_error="false",network_error="false"}[1m]))'
      promql_total: 'sum(rate(frontend_rum_total[1m]))'
      source: frontend_rum.jsonl
    slo:
      target: 0.99
      window_days: 30
    budget:
      total_events_per_month: 5184000
      allowed_failures_per_month: 51840
      downtime_minutes_equivalent: 432
