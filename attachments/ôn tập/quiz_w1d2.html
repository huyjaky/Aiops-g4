<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps Quiz - Tuần 1: Log Mining & Parsing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-attachment: fixed;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            height: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 99px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .difficulty-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .diff-easy { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .diff-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .diff-hard { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .question-text {
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 1rem;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 1.2rem 1.5rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .option-btn.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--primary);
        }
        
        .option-btn.selected::before {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: inset 0 0 0 4px var(--bg-color);
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--success) !important;
        }

        .option-btn.correct::before {
            background: var(--success) !important;
            border-color: var(--success) !important;
            box-shadow: inset 0 0 0 4px var(--bg-color) !important;
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--danger) !important;
        }

        .option-btn.wrong::before {
            background: var(--danger) !important;
            border-color: var(--danger) !important;
            box-shadow: inset 0 0 0 4px var(--bg-color) !important;
        }

        .controls {
            margin-top: 2.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 99px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .next-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .next-btn:hover {
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) calc(var(--score-pct) * 1%), rgba(255,255,255,0.05) 0);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .score-circle::after {
            content: '';
            position: absolute;
            width: 170px;
            height: 170px;
            background: var(--bg-color);
            border-radius: 50%;
        }

        .score-value {
            position: relative;
            z-index: 1;
            font-size: 3rem;
            font-weight: 800;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="quiz-screen">
        <div class="header">
            <h1>AIOps Quiz - Tuần 1: Log Mining & Parsing</h1>
            <p>Trắc nghiệm kiến thức AIOps</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="question-meta">
            <span id="q-counter">Câu hỏi 1 / 50</span>
            <span id="q-difficulty" class="difficulty-badge diff-easy">Mức độ: Dễ</span>
        </div>

        <div class="question-text" id="q-text">Đang tải câu hỏi...</div>

        <div class="options-grid" id="options"></div>

        <div class="controls">
            <button class="next-btn" id="next-btn">Tiếp theo →</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h1>Hoàn Thành!</h1>
        <p style="margin-bottom: 2rem; color: var(--text-muted); font-size: 1.2rem;">Kết quả phân tích AIOps của bạn</p>
        
        <div class="score-circle" id="score-circle" style="--score-pct: 0;">
            <div class="score-value" id="score-text">0%</div>
        </div>
        
        <div style="font-size: 1.5rem; margin-bottom: 2rem;">
            Đúng <span id="correct-count" style="color: var(--success); font-weight: bold;">0</span> / <span id="total-count">50</span> câu
        </div>

        <button class="next-btn visible" onclick="location.reload()">Thử lại</button>
    </div>
</div>

<script>
const questions = [{"question": "Mục đích chính của việc sử dụng log kết hợp với metric là gì?", "options": ["Để lưu trữ dữ liệu vĩnh viễn", "Metric báo 'cái gì sai', log giải thích 'tại sao'", "Để giảm tải cho server", "Để tạo biểu đồ đẹp hơn"], "answer": 1, "difficulty": "easy"}, {"question": "Trong production, log thường có định dạng nào phổ biến nhất?", "options": ["100% Structured Log (JSON)", "100% Unstructured Log", "Hỗn hợp giữa cả Structured và Unstructured", "Không ghi log"], "answer": 2, "difficulty": "easy"}, {"question": "Điểm khác biệt lớn nhất giữa log của môi trường textbook và production là gì?", "options": ["Production log có màu sắc", "Production log chứa các tham số động thay đổi liên tục", "Production log luôn bằng tiếng Anh", "Textbook log dài hơn"], "answer": 1, "difficulty": "easy"}, {"question": "Tại sao việc dùng lệnh `grep` trên hệ thống log lớn không hiệu quả để phân tích anomaly?", "options": ["Grep chạy quá chậm", "Grep làm tốn nhiều RAM", "Grep chỉ tìm chuỗi, không thể đếm sự kiện hay phân biệt pattern một cách hệ thống", "Grep chỉ hỗ trợ tiếng Anh"], "answer": 2, "difficulty": "easy"}, {"question": "Ưu điểm của Structured Log (như JSON) là gì?", "options": ["Tiết kiệm bộ nhớ lưu trữ", "Dễ parse và dễ query theo từng field cụ thể", "Bảo mật hơn", "Không bị lag mạng"], "answer": 1, "difficulty": "easy"}, {"question": "Tại sao kích thước lưu trữ của Structured Log thường lớn hơn Unstructured Log khoảng 30%?", "options": ["Do chứa hình ảnh", "Do bị lặp lại các tên field (key) trong mỗi dòng", "Do bị nén kém", "Do dùng font chữ lớn"], "answer": 1, "difficulty": "easy"}, {"question": "Theo Splunk State of Observability 2024, một enterprise trung bình ingest khoảng bao nhiêu log mỗi ngày?", "options": ["1-5 GB", "10-50 GB", "1-5 TB", "100-500 TB"], "answer": 2, "difficulty": "easy"}, {"question": "Khái niệm 'Log parsing' được hiểu là gì?", "options": ["Xóa các dòng log bị lỗi", "Biến text thô thành cấu trúc có thể phân tích bằng máy", "Gửi log lên Cloud", "Chuyển log thành đồ thị"], "answer": 1, "difficulty": "easy"}, {"question": "Trong quá trình log parsing, 'Template' là phần nào của dòng log?", "options": ["Phần tên file chứa log", "Phần nội dung tĩnh (static) của dòng log", "Thời gian ghi log", "Phần mã lỗi hệ thống"], "answer": 1, "difficulty": "easy"}, {"question": "Trong log parsing, 'Parameter' là phần nào của dòng log?", "options": ["Địa chỉ IP của server", "Phần nội dung động thay đổi theo từng dòng (như IP, OrderID)", "Tham số cấu hình của ứng dụng", "Từ khóa tìm kiếm"], "answer": 1, "difficulty": "easy"}, {"question": "Parser nào hiện được coi là phổ biến và có tỷ lệ accuracy + speed tốt nhất trong AIOps?", "options": ["Drain3", "Spell", "Lenma", "LLM-based Parser"], "answer": 0, "difficulty": "easy"}, {"question": "Drain3 là thuật toán log parsing được cài đặt bằng ngôn ngữ nào?", "options": ["Java", "C++", "Python", "Go"], "answer": 2, "difficulty": "easy"}, {"question": "Độ phức tạp thời gian (Time complexity) của Drain3 để parse một dòng log là bao nhiêu?", "options": ["O(1)", "O(log N)", "O(N)", "O(N^2)"], "answer": 0, "difficulty": "easy"}, {"question": "Drain3 sử dụng cấu trúc dữ liệu cốt lõi nào để phân nhóm log?", "options": ["Hash Table", "Fixed-depth parse tree", "Linked List", "Binary Search Tree"], "answer": 1, "difficulty": "easy"}, {"question": "Tại level 1 của Drain3 parse tree, các dòng log được nhóm dựa trên tiêu chí nào?", "options": ["Log level (INFO, ERROR)", "Địa chỉ IP", "Log length (số từ trong dòng log)", "Tên Service"], "answer": 2, "difficulty": "easy"}, {"question": "Tại level 2 của Drain3 parse tree, tiêu chí phân nhóm thường là gì?", "options": ["Độ dài của log", "Ký tự cuối cùng", "First token (thường là log level như ERROR, INFO)", "Số lượng tham số động"], "answer": 2, "difficulty": "medium"}, {"question": "Tại level 3+ của Drain3, log được gộp vào template dựa trên nguyên tắc gì?", "options": ["Độ dài chuỗi giống nhau tuyệt đối", "Similarity matching với các template đã biết đạt ngưỡng threshold", "Kiểm tra bằng Regex", "Dùng LLM để đánh giá"], "answer": 1, "difficulty": "medium"}, {"question": "Tham số `drain_sim_th` trong thư viện Drain3 dùng để làm gì?", "options": ["Số lượng cây trong rừng", "Ngưỡng Similarity (Similarity threshold) quyết định việc gộp hay tách template mới", "Độ sâu tối đa của tree", "Thời gian tối đa để parse"], "answer": 1, "difficulty": "medium"}, {"question": "Hậu quả của việc thiết lập `drain_sim_th` quá cao (ví dụ: 0.8+) là gì?", "options": ["Gộp tất cả log vào 1 template", "Chạy rất nhanh nhưng không chính xác", "Tách quá nhiều, biến mỗi dòng log thành 1 template riêng vô dụng", "Làm treo hệ thống"], "answer": 2, "difficulty": "medium"}, {"question": "Khi so sánh với Drain3, parser Spell có đặc điểm gì về tốc độ?", "options": ["Nhanh gấp đôi Drain3", "Nhanh bằng Drain3", "Chậm hơn Drain3 từ 5-10 lần", "Chậm hơn cả LLM"], "answer": 2, "difficulty": "medium"}, {"question": "Nhược điểm chí mạng khiến LLM-based parser (như GPT) chưa thể dùng real-time trên lượng log lớn là gì?", "options": ["Không hiểu được ngữ nghĩa", "Tốc độ quá chậm và tốn kém chi phí API cho từng dòng log", "Không hỗ trợ format JSON", "Hay bị halucinate log level"], "answer": 1, "difficulty": "medium"}, {"question": "Sau khi log đã được parse thành template, làm thế nào để detect anomaly trên log?", "options": ["Dùng lệnh grep để đếm", "Biến template count thành time series và áp dụng các detector như 3σ hoặc Isolation Forest", "Đọc thủ công", "So sánh kích thước file log"], "answer": 1, "difficulty": "medium"}, {"question": "Trong AIOps, tại sao 'New Template Detection' lại là một signal cảnh báo rất mạnh?", "options": ["Vì file cấu hình vừa được lưu", "Vì template mới chứng tỏ có một hành vi, lỗi hoặc sự kiện chưa từng xảy ra trong hệ thống", "Vì nó làm tốn RAM", "Vì template mới có màu đỏ"], "answer": 1, "difficulty": "medium"}, {"question": "Một sai lầm phổ biến khi áp dụng 'New Template Detection' là gì?", "options": ["Không dùng Regex", "Lưu template vào Database", "Không filter template mới trong grace period (1 giờ đầu) ngay sau khi deploy code mới", "Dùng Drain3 thay vì Spell"], "answer": 2, "difficulty": "medium"}, {"question": "Kỹ thuật TF-IDF tạo vector từ log template dựa trên yếu tố nào?", "options": ["Tần suất xuất hiện của các từ (Word frequency)", "Thứ tự thời gian của từ", "Độ dài của từ", "Cấu trúc ngữ pháp"], "answer": 0, "difficulty": "medium"}, {"question": "Hạn chế chính của TF-IDF khi dùng để so sánh sự tương đồng của các log template là gì?", "options": ["Chi phí API cao", "Có thể cho similarity thấp nếu các từ khác nhau dù ý nghĩa giống nhau", "Chỉ hỗ trợ tiếng Anh", "Không chạy được trên Python"], "answer": 1, "difficulty": "medium"}, {"question": "Công nghệ nào thường được sử dụng để hiểu sâu về mặt ngữ nghĩa (semantic) của các log template?", "options": ["Z-Score", "TF-IDF Vectorizer", "Sentence-Transformers (như MiniLM)", "Isolation Forest"], "answer": 2, "difficulty": "medium"}, {"question": "Cross-Signal Analysis là quá trình kết hợp các thành phần nào để phân tích?", "options": ["Log của DB và Log của App", "Metric anomaly và Log template analysis", "CPU và RAM", "Frontend và Backend"], "answer": 1, "difficulty": "medium"}, {"question": "Bước đầu tiên trong workflow chuẩn của Cross-Signal Analysis là gì?", "options": ["Parse 100% log", "Đợi Metric anomaly detector trigger để biết thời điểm xảy ra sự cố", "Train mô hình NLP", "Chạy lệnh grep tìm ERROR"], "answer": 1, "difficulty": "medium"}, {"question": "Tại sao phải filter log trong time window (±5 phút) xung quanh thời điểm metric anomaly?", "options": ["Để làm đẹp biểu đồ", "Để giảm kích thước tập tin", "Để thu hẹp lượng log cần phân tích xuống mức có thể quản lý và tìm ra nguyên nhân", "Để tuân thủ SLA"], "answer": 2, "difficulty": "medium"}, {"question": "Đối với hệ thống gen log tới quy mô 10TB/ngày, kỹ thuật nào bắt buộc phải triển khai ở tầng pipeline?", "options": ["Chạy LLM parser", "Log Sampling (lấy mẫu log)", "Grep toàn bộ hệ thống", "Chuyển hết sang Unstructured Log"], "answer": 1, "difficulty": "hard"}, {"question": "Tail-based log sampling là chiến lược giữ lại log theo cách nào?", "options": ["Lấy random 10% log", "Lấy 100% log nhưng chỉ của 10% request", "Chỉ giữ lại log từ những request bị lỗi hoặc xử lý chậm", "Tự động tăng sampling khi có lỗi"], "answer": 2, "difficulty": "hard"}, {"question": "Nhược điểm của Tail-based sampling là gì?", "options": ["Khó code", "Làm mất log của request chậm", "Bỏ lỡ các vấn đề dạng slow-burn (tăng dần chậm) vì nó không lập tức bị gắn cờ lỗi", "Tốn quá nhiều dung lượng"], "answer": 2, "difficulty": "hard"}, {"question": "Nếu team dev có thể thay đổi source code của service, best practice cho logging để hỗ trợ AIOps là gì?", "options": ["Viết log tiếng Việt", "Sử dụng Structured Logging (JSON) và định nghĩa trước các fields", "Không viết log nữa để giảm tải", "Viết một câu văn thật dài và chi tiết"], "answer": 1, "difficulty": "hard"}, {"question": "Nếu hệ thống 100% là Structured Log (JSON), bạn có cần dùng thư viện như Drain3 không?", "options": ["Bắt buộc phải dùng", "Không, vì có thể trực tiếp aggregate và detect anomaly trên các trường dữ liệu JSON", "Chỉ dùng khi log là JSON quá lớn", "Dùng để nén JSON"], "answer": 1, "difficulty": "hard"}, {"question": "Làm thế nào xác định được log template liên quan nhất khi có một metric anomaly xảy ra?", "options": ["Lấy template có chữ ERROR", "Tìm template count nào spike (tăng đột biến) cùng thời điểm với metric anomaly", "Lấy template dài nhất", "Lấy template của DB"], "answer": 1, "difficulty": "hard"}, {"question": "Lợi thế lớn nhất của chiến lược Adaptive log sampling là gì?", "options": ["Code cực kỳ đơn giản", "Tốn ít bộ nhớ nhất", "Tự động tăng tỷ lệ lấy mẫu (sampling rate) khi phát hiện có anomaly, giữ nguyên context sự cố", "Hỗ trợ nén dung lượng cao nhất"], "answer": 2, "difficulty": "hard"}, {"question": "Trong đánh giá parser, KPI 'Parsing accuracy' let currentQ = 0;
let score = 0;
let answered = false;

const qText = document.getElementById('q-text');
const optionsDiv = document.getElementById('options');
const nextBtn = document.getElementById('next-btn');
const progress = document.getElementById('progress');
const qCounter = document.getElementById('q-counter');
const qDiff = document.getElementById('q-difficulty');

function loadQuestion() {
    answered = false;
    nextBtn.classList.remove('visible');
    
    const q = questions[currentQ];
    qText.textContent = q.question;
    
    // Update Meta
    qCounter.textContent = `Câu hỏi ${currentQ + 1} / ${questions.length}`;
    progress.style.width = `${(currentQ / questions.length) * 100}%`;
    
    let diffClass = "diff-easy";
    let diffText = "Mức độ: Dễ";
    if (q.difficulty === "medium") { diffClass = "diff-medium"; diffText = "Mức độ: Trung Bình"; }
    if (q.difficulty === "hard") { diffClass = "diff-hard"; diffText = "Mức độ: Khó"; }
    
    qDiff.className = `difficulty-badge ${diffClass}`;
    qDiff.textContent = diffText;

    optionsDiv.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn animate-fade';
        btn.style.animationDelay = `${idx * 0.1}s`;
        btn.textContent = opt;
        btn.onclick = () => selectOption(idx, btn);
        optionsDiv.appendChild(btn);
    });
}

function selectOption(idx, btnElement) {
    if (answered) return;
    answered = true;
    
    const q = questions[currentQ];
    const btns = optionsDiv.querySelectorAll('.option-btn');
    
    btns.forEach(b => b.disabled = true);
    
    if (idx === q.answer) {
        btnElement.classList.add('correct');
        score++;
    } else {
        btnElement.classList.add('wrong');
        btns[q.answer].classList.add('correct');
    }
    
    nextBtn.classList.add('visible');
}

nextBtn.onclick = () => {
    currentQ++;
    if (currentQ < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
};

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    const resScreen = document.getElementById('result-screen');
    resScreen.style.display = 'block';
    resScreen.classList.add('animate-fade');
    
    const pct = Math.round((score / questions.length) * 100);
    document.getElementById('score-circle').style.setProperty('--score-pct', pct);
    document.getElementById('score-text').textContent = `${pct}%`;
    document.getElementById('correct-count').textContent = score;
    document.getElementById('total-count').textContent = questions.length;
}

// Start
loadQuestion();
</script>
